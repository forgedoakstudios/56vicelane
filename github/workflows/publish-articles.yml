name: Scheduled Article Publisher

on:
  schedule:
    # 8am ET = 13:00 UTC (EST) / 12:00 UTC (EDT)
    - cron: '0 13 * * 1-6'
    # 4pm ET = 21:00 UTC (EST) / 20:00 UTC (EDT)
    - cron: '0 21 * * 1-6'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to publish manually (tech or other)'
        required: true
        default: 'tech'
        type: choice
        options:
          - tech
          - other

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine which slot to publish
        id: slot
        run: |
          HOUR=$(date -u +%H)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ github.event.inputs.slot }}"
          elif [ "$HOUR" = "13" ] || [ "$HOUR" = "12" ]; then
            SLOT="tech"
          else
            SLOT="other"
          fi

          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "Publishing slot: $SLOT"

      - name: Find oldest draft in slot
        id: draft
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          DRAFT_DIR="drafts/$SLOT"

          if [ ! -d "$DRAFT_DIR" ]; then
            echo "No drafts directory found at $DRAFT_DIR"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get oldest .html file by creation/commit date
          OLDEST=$(git log --diff-filter=A --name-only --pretty=format: -- "$DRAFT_DIR/*.html" | \
                   grep "^$DRAFT_DIR/" | tail -1)

          # Fallback: just grab first alphabetically if git log comes up empty
          if [ -z "$OLDEST" ]; then
            OLDEST=$(ls "$DRAFT_DIR"/*.html 2>/dev/null | head -1)
          fi

          if [ -z "$OLDEST" ]; then
            echo "No drafts found in $DRAFT_DIR — nothing to publish today."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          FILENAME=$(basename "$OLDEST")
          echo "found=true" >> $GITHUB_OUTPUT
          echo "filepath=$OLDEST" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "Found draft to publish: $OLDEST"

      - name: Move draft to live articles folder
        if: steps.draft.outputs.found == 'true'
        run: |
          FILEPATH="${{ steps.draft.outputs.filepath }}"
          FILENAME="${{ steps.draft.outputs.filename }}"
          SLOT="${{ steps.draft.outputs.slot }}"

          # Destination: articles/ for all published content
          DEST_DIR="articles"
          mkdir -p "$DEST_DIR"

          # Move the file
          git mv "$FILEPATH" "$DEST_DIR/$FILENAME"

          echo "Moved $FILEPATH → $DEST_DIR/$FILENAME"

      - name: Commit and push
        if: steps.draft.outputs.found == 'true'
        run: |
          FILENAME="${{ steps.draft.outputs.filename }}"
          SLOT="${{ steps.draft.outputs.slot }}"

          git config user.name "Vice Frequency Bot"
          git config user.email "bot@56vicelane.com"

          PUBLISH_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "publish: $FILENAME [$SLOT slot] — $PUBLISH_TIME"
          git push

          echo "✅ Published $FILENAME at $PUBLISH_TIME"

      - name: No drafts available notice
        if: steps.draft.outputs.found == 'false'
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          echo "⚠️ No drafts in queue for [$SLOT] slot. Add files to drafts/$SLOT/ to schedule them."
