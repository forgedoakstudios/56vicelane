name: GTA News Scan

on:
  schedule:
    # Every 90 minutes, 16x/day — bumped up from 3x/day so we can catch
    # GTA6 trailer 3 (or any major drop) within 90 min instead of ~8 hrs.
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/scan-news.js
      - name: Commit scan results
        run: |
          git config user.name "56ViceLane Bot"
          git config user.email "bot@56vicelane.com"
          git add news-scan/
          git diff --staged --quiet || git commit -m "News scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
