name: Auto-Update articles.json

on:
  push:
    paths:
      - 'articles/**'
      - 'drafts/**'
  workflow_dispatch:

jobs:
  update-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild articles.json
        run: node tools/build-articles.js

      - name: Rebuild sitemap.xml
        run: node tools/build-sitemap.js

      - name: Commit updated articles.json + sitemap.xml
        run: |
          git config user.name "56ViceLane Bot"
          git config user.email "bot@56vicelane.com"
          git add articles.json sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-update articles.json + sitemap [skip ci]"
          git push
